name: Build Lazarus Project

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Repository auschecken
      uses: actions/checkout@v4

    - name: FreePascal und Lazarus installieren
      run: |
        sudo apt-get update
        sudo apt-get install -y lazarus fp-compiler

    - name: Projekt bauen
      run: |
        lazbuild path/to/your_project.lpi
