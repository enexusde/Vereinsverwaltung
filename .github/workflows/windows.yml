name: Integration Build Windows

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Repository auschecken
      uses: actions/checkout@v4

    - name: Lazarus installieren
      run: |
        choco install lazarus --yes

    - name: Lazarus zum PATH hinzufügen
      run: |
        echo "C:\lazarus" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Projekt bauen
      run: |
        lazbuild Vereinsverwaltung.lpi

    - name: Build Artefakt hochladen
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: |
          Vereinsverwaltung.exe
